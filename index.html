<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dataset Hash Registry</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        body { padding: 2rem 0; }
        .container { max-width: 600px; }
        #status { margin-top: 1rem; padding: 1rem; border-radius: 8px; display: none; }
        .success { background: #d4edda; color: #155724; display: block !important; }
        .error { background: #f8d7da; color: #721c24; display: block !important; }
        .leaderboard { margin-top: 3rem; border-top: 1px solid #e1e1e1; padding-top: 2rem; }
        ul { list-style-type: none; padding-left: 0; }
        li { padding: 0.5rem 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <main class="container">
        <hgroup>
            <h1>Dataset Registry</h1>
            <h2>Claim your dataset. Only your Group Name is public.</h2>
        </hgroup>

        <article>
            <label for="groupName">Group Name (Optional)</label>
            <input type="text" id="groupName" placeholder="e.g. The Data Wizards">

            <label for="dataset">Dataset Name / URL</label>
            <input type="text" id="dataset" placeholder="e.g. World Bank Population 2024" required>
            
            <button id="submitBtn" onclick="processHash()">Check & Reserve</button>
            <div id="status"></div>
        </article>
        
        <p><small><strong>Privacy Note:</strong> Your dataset name is hashed <strong>locally</strong> in your browser using $SHA-256$. The instructor only sees the hash and your group name.</small></p>

        <section class="leaderboard">
            <h3>Registered Groups</h3>
            <ul id="groupList">
                <li>Loading registered groups...</li>
            </ul>
        </section>
    </main>

    <script>
        // PASTE YOUR URL BELOW
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxON-li3gAdg1J6YHeAecvt5NJ74hH0yYXCDIJl0GGJIzrSeCs9wo2HAqn1wAzSb3gj/exec";

        window.onload = loadGroups;

        async function loadGroups() {
            const list = document.getElementById('groupList');
            try {
                const response = await fetch(WEB_APP_URL);
                const groups = await response.json();
                list.innerHTML = groups.length === 0 
                    ? "<li>No groups registered yet.</li>" 
                    : groups.map(g => `<li>✅ ${g}</li>`).join('');
            } catch (err) {
                list.innerHTML = "<li>Could not load group list.</li>";
            }
        }

        async function processHash() {
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            const datasetInput = document.getElementById('dataset').value.trim();
            const groupInput = document.getElementById('groupName').value.trim();

            if (!datasetInput) return alert("Please enter a dataset name!");

            btn.ariaBusy = "true";
            btn.disabled = true;
            status.className = ""; 
            status.textContent = "Hashing locally...";

            // 1. Hash locally
            const msgUint8 = new TextEncoder().encode(datasetInput.toLowerCase());
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            status.textContent = "Checking registry...";

            // 2. Send hash + group name
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ 
                        hash: hashHex,
                        group: groupInput || "Anonymous Group"
                    })
                });
                const result = await response.text();

                if (result.startsWith("Taken by:")) {
                    status.className = "error";
                    status.textContent = "❌ " + result;
                } else {
                    status.className = "success";
                    status.textContent = "✅ Success! Reserved for " + (groupInput || "your group") + ".";
                    document.getElementById('dataset').value = "";
                    loadGroups(); // Refresh the list
                }
            } catch (err) {
                status.className = "error";
                status.textContent = "Connection error. Ensure the script is deployed correctly.";
            } finally {
                btn.ariaBusy = "false";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
